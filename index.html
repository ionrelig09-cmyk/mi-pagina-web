<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TICKET // Donde estacione</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --asphalt: #17181a;
    --concrete: #26282b;
    --concrete-line: #3d4045;
    --safety-yellow: #f5b700;
    --hazard-black: #111214;
    --paper: #ece4d3;
    --paper-shadow: #d8cdb4;
    --stamp-red: #b23a1f;
    --ink: #2b2620;
    --ink-dim: #7a7264;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,0.03), transparent 40%),
      radial-gradient(circle at 80% 85%, rgba(255,255,255,0.02), transparent 40%),
      var(--asphalt);
    background-image:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,0.03), transparent 40%),
      radial-gradient(circle at 80% 85%, rgba(255,255,255,0.02), transparent 40%),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 6px),
      var(--asphalt);
    color:var(--ink);
    font-family:'Space Mono', monospace;
    display:flex;
    justify-content:center;
    padding:0 0 60px;
  }

  .hazard-bar{
    position:fixed;
    top:0; left:0; right:0;
    height:14px;
    background: repeating-linear-gradient(
      -45deg,
      var(--safety-yellow) 0px, var(--safety-yellow) 18px,
      var(--hazard-black) 18px, var(--hazard-black) 36px
    );
    z-index:10;
  }

  .wrap{ width:100%; max-width:460px; padding:44px 16px 0; }

  .lot-header{
    text-align:center;
    margin-bottom:22px;
  }
  .lot-label{
    font-family:'Space Mono', monospace;
    color:var(--safety-yellow);
    font-size:13px;
    letter-spacing:4px;
    text-transform:uppercase;
    margin:0 0 4px;
  }
  .lot-title{
    font-family:'Bebas Neue', sans-serif;
    font-size:46px;
    letter-spacing:2px;
    color:#f2ede0;
    margin:0;
    line-height:1;
  }

  /* ---- TICKET ---- */
  .ticket{
    background:var(--paper);
    box-shadow: 0 18px 40px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(0,0,0,0.05);
    position:relative;
    padding:0;
  }

  .ticket-strip{
    background: repeating-linear-gradient(
      -45deg,
      var(--safety-yellow) 0px, var(--safety-yellow) 14px,
      var(--hazard-black) 14px, var(--hazard-black) 28px
    );
    height:10px;
  }

  .ticket-body{ padding:22px 24px 24px; }

  .ticket-eyebrow{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    border-bottom: 2px dashed var(--paper-shadow);
    padding-bottom:12px;
    margin-bottom:16px;
  }
  .ticket-eyebrow .lot-no{
    font-family:'Bebas Neue', sans-serif;
    font-size:22px;
    letter-spacing:1px;
    color:var(--ink);
  }
  .ticket-eyebrow .serial{
    font-size:12px;
    color:var(--ink-dim);
    letter-spacing:1px;
  }

  .park-btn{
    width:100%;
    font-family:'Bebas Neue', sans-serif;
    font-size:22px;
    letter-spacing:2px;
    background:var(--hazard-black);
    color:var(--safety-yellow);
    border:none;
    padding:18px 10px;
    cursor:pointer;
    transition: transform .08s, background .15s;
  }
  .park-btn:hover{ background:#000; }
  .park-btn:active{ transform:scale(0.98); }
  .park-btn:disabled{ background:#555; color:#999; cursor:not-allowed; }

  .field-label{
    font-size:12px;
    letter-spacing:2px;
    color:var(--ink-dim);
    text-transform:uppercase;
    margin:16px 0 6px;
  }

  textarea, .file-btn{
    width:100%;
    background:#fbf8f0;
    border:1px solid var(--paper-shadow);
    color:var(--ink);
    font-family:'Space Mono', monospace;
    font-size:15px;
    padding:10px 12px;
  }
  textarea{ resize:vertical; min-height:52px; }

  .file-row{ position:relative; }
  .file-row input[type=file]{
    position:absolute; inset:0; opacity:0; cursor:pointer;
  }
  .file-btn{
    display:flex; align-items:center; gap:8px;
    color:var(--ink-dim);
    cursor:pointer;
  }

  .status-line{
    margin-top:14px;
    font-size:14px;
    color:var(--ink-dim);
    min-height:18px;
  }
  .status-line.ok{ color:#2f6b3a; }
  .status-line.err{ color:var(--stamp-red); }

  /* ---- perforation between ticket and stub ---- */
  .perforation{
    height:0;
    border-top: 2px dashed #4a4d52;
    position:relative;
    margin: 0 0;
  }
  .perforation::before, .perforation::after{
    content:"";
    position:absolute;
    top:-9px;
    width:18px; height:18px;
    background:var(--asphalt);
    border-radius:50%;
  }
  .perforation::before{ left:-9px; }
  .perforation::after{ right:-9px; }

  /* ---- STUB (saved location) ---- */
  .stub{ display:none; }
  .stub.show{ display:block; }

  .stub-body{
    padding:22px 24px 26px;
    position:relative;
    overflow:hidden;
  }

  .stamp{
    position:absolute;
    top:14px; right:18px;
    border: 3px solid var(--stamp-red);
    color:var(--stamp-red);
    font-family:'Bebas Neue', sans-serif;
    font-size:20px;
    letter-spacing:2px;
    padding:4px 10px;
    transform: rotate(-9deg);
    opacity:0.85;
    border-radius:4px;
  }

  .stub-heading{
    font-family:'Bebas Neue', sans-serif;
    font-size:24px;
    letter-spacing:1px;
    color:var(--ink);
    margin:0 0 10px;
    max-width:70%;
  }

  .coord-block{
    font-size:20px;
    letter-spacing:1px;
    color:var(--ink);
    background:#fbf8f0;
    border:1px solid var(--paper-shadow);
    padding:10px 12px;
    margin-bottom:10px;
  }

  .stub-nota{ font-size:15px; color:var(--ink); margin:0 0 6px; }
  .stub-time{ font-size:13px; color:var(--ink-dim); margin:0 0 14px; }

  .foto-frame{
    border:1px solid var(--paper-shadow);
    padding:4px;
    background:#fbf8f0;
    margin-bottom:16px;
  }
  .foto-frame img{ width:100%; display:block; }

  .stub-actions{ display:flex; gap:10px; }
  .stub-actions a, .stub-actions button{
    flex:1;
    text-align:center;
    font-family:'Bebas Neue', sans-serif;
    font-size:15px;
    letter-spacing:1px;
    padding:12px 8px;
    text-decoration:none;
    cursor:pointer;
    border:none;
  }
  .map-link{ background:var(--hazard-black); color:var(--safety-yellow); }
  .map-link:hover{ background:#000; }
  .clear-btn{ background:transparent; color:var(--stamp-red); border:1px solid var(--stamp-red) !important; }
  .clear-btn:hover{ background:rgba(178,58,31,0.08); }

  .empty-msg{
    text-align:center;
    color:#5c5f64;
    font-size:13px;
    letter-spacing:1px;
    padding:20px 10px 0;
  }
</style>
</head>
<body>
<div class="hazard-bar"></div>

<div class="wrap">
  <div class="lot-header">
    <p class="lot-label">nivel &middot; sector &middot; memoria</p>
    <p class="lot-title">DONDE ESTACIONE</p>
  </div>

  <div class="ticket">
    <div class="ticket-strip"></div>
    <div class="ticket-body">
      <div class="ticket-eyebrow">
        <span class="lot-no">TICKET</span>
        <span class="serial" id="serialNo">SER. ----</span>
      </div>

      <button class="park-btn" id="saveBtn">MARCAR ESTE LUGAR</button>

      <p class="field-label">Nota (piso, letra, referencia)</p>
      <textarea id="notaInput" placeholder="ej. nivel 3, columna C-14, cerca del ascensor"></textarea>

      <p class="field-label">Foto del lugar (opcional)</p>
      <div class="file-row">
        <div class="file-btn">&#128247; subir o tomar foto</div>
        <input type="file" id="fotoInput" accept="image/*" capture="environment">
      </div>

      <p class="status-line" id="status"></p>
    </div>

    <div class="perforation"></div>

    <div class="stub" id="stub">
      <div class="stub-body">
        <span class="stamp">PARKED</span>
        <p class="stub-heading">Tu ultimo lugar</p>
        <p class="coord-block" id="coordsText">--</p>
        <p class="stub-nota" id="notaText"></p>
        <p class="stub-time" id="timeText"></p>
        <div class="foto-frame" id="fotoFrame" style="display:none;">
          <img id="fotoPreview" alt="foto del lugar">
        </div>
        <div class="stub-actions">
          <a class="map-link" id="mapLink" href="#" target="_blank">ABRIR MAPA</a>
          <button class="clear-btn" id="clearBtn">BORRAR</button>
        </div>
      </div>
    </div>
  </div>

  <p class="empty-msg" id="emptyMsg">sin ticket activo &middot; marca tu lugar para empezar</p>
</div>

<script>
  const saveBtn = document.getElementById('saveBtn');
  const notaInput = document.getElementById('notaInput');
  const fotoInput = document.getElementById('fotoInput');
  const statusEl = document.getElementById('status');
  const stub = document.getElementById('stub');
  const emptyMsg = document.getElementById('emptyMsg');
  const coordsText = document.getElementById('coordsText');
  const notaText = document.getElementById('notaText');
  const timeText = document.getElementById('timeText');
  const fotoFrame = document.getElementById('fotoFrame');
  const fotoPreview = document.getElementById('fotoPreview');
  const mapLink = document.getElementById('mapLink');
  const clearBtn = document.getElementById('clearBtn');
  const serialNo = document.getElementById('serialNo');

  const STORAGE_KEY = 'dondeEstacione_datos';

  function setStatus(msg, tipo){
    statusEl.textContent = msg;
    statusEl.className = 'status-line' + (tipo ? ' ' + tipo : '');
  }

  function fileToBase64(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function generarSerial(timestamp){
    return String(timestamp).slice(-6);
  }

  function mostrarGuardado(datos){
    emptyMsg.style.display = 'none';
    stub.classList.add('show');

    serialNo.textContent = `SER. ${generarSerial(datos.timestamp)}`;
    coordsText.textContent = `${datos.lat.toFixed(6)}, ${datos.lng.toFixed(6)}`;
    notaText.textContent = datos.nota ? datos.nota : '';
    notaText.style.display = datos.nota ? 'block' : 'none';
    timeText.textContent = `marcado: ${new Date(datos.timestamp).toLocaleString('es-ES')}`;
    mapLink.href = `https://www.google.com/maps?q=${datos.lat},${datos.lng}`;

    if(datos.foto){
      fotoPreview.src = datos.foto;
      fotoFrame.style.display = 'block';
    }else{
      fotoFrame.style.display = 'none';
    }
  }

  function cargarGuardado(){
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      try{ mostrarGuardado(JSON.parse(raw)); }
      catch(e){ /* datos corruptos, ignorar */ }
    }
  }

  saveBtn.addEventListener('click', () => {
    if(!navigator.geolocation){
      setStatus('tu navegador no soporta geolocalizacion', 'err');
      return;
    }

    saveBtn.disabled = true;
    setStatus('obteniendo ubicacion...', '');

    navigator.geolocation.getCurrentPosition(async (pos) => {
      const datos = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        nota: notaInput.value.trim(),
        timestamp: Date.now(),
        foto: null
      };

      const file = fotoInput.files[0];
      if(file){
        try{ datos.foto = await fileToBase64(file); }
        catch(e){ /* si falla la foto, seguimos sin ella */ }
      }

      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(datos));
        mostrarGuardado(datos);
        setStatus('ticket emitido correctamente', 'ok');
      }catch(e){
        setStatus('no se pudo guardar (la foto puede ser muy pesada)', 'err');
      }

      saveBtn.disabled = false;
    }, (err) => {
      setStatus('no se pudo obtener la ubicacion: ' + err.message, 'err');
      saveBtn.disabled = false;
    }, { enableHighAccuracy:true, timeout:10000 });
  });

  clearBtn.addEventListener('click', () => {
    localStorage.removeItem(STORAGE_KEY);
    stub.classList.remove('show');
    emptyMsg.style.display = 'block';
    notaInput.value = '';
    fotoInput.value = '';
    setStatus('');
  });

  cargarGuardado();
</script>
</body>
</html>
